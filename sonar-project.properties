# SonarQube Configuration
# https://docs.sonarsource.com/sonarqube/latest/analyzing-source-code/scanners/sonarscanner/

sonar.projectKey=azure-foundry-architect-framework
sonar.projectName=Azure Foundry Architect Framework
sonar.projectVersion=1.0.0

# Source directories
sonar.sources=src,client/src
sonar.tests=tests

# Exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/__pycache__/**,\
  **/migrations/**,\
  **/*.min.js,\
  **/ArchitectureDiagram.tsx

# Test exclusions
sonar.test.exclusions=**/node_modules/**,**/dist/**

# Python settings
sonar.python.version=3.11
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=test-results.xml

# TypeScript / JavaScript settings
sonar.typescript.lcov.reportPaths=client/coverage/lcov.info
sonar.javascript.lcov.reportPaths=client/coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8

# Quality Gate
sonar.qualitygate.wait=true
