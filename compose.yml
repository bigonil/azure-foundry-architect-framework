name: azure-foundry-architect-framework

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      APP_ENV: development
      APP_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - ./src:/app/src:ro    # Hot reload in dev
    restart: unless-stopped
    networks:
      - app

  client:
    build:
      context: .
      dockerfile: docker/Dockerfile.client
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app

  # Local dev: Redis for session caching (optional, replaces in-memory store)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app
    profiles:
      - full    # Only start with: docker compose --profile full up

volumes:
  redis_data:

networks:
  app:
    driver: bridge
