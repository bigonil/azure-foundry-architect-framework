name: azure-foundry-architect-framework

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      APP_ENV: development
      APP_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000"
      MONGODB_URI: "mongodb://admin:${MONGO_ROOT_PASSWORD:-changeme_local}@mongodb:27017/architect-framework?authSource=admin"
      # Pre-configured MCP servers — internal Docker network URLs
      AZURE_MCP_SERVER_URL: "http://mcp-azure:3333/sse"
      AZURE_MCP_SERVER_ENABLED: "${AZURE_MCP_SERVER_ENABLED:-false}"
      AZURE_DEVOPS_MCP_SERVER_URL: "http://mcp-devops:3334/sse"
      AZURE_DEVOPS_MCP_SERVER_ENABLED: "${AZURE_DEVOPS_MCP_SERVER_ENABLED:-false}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./src:/app/src:ro          # Hot reload in dev
      - efesto_uploads:/app/uploads # Shared artifact volume
    restart: unless-stopped
    networks:
      - app

  client:
    build:
      context: .
      dockerfile: docker/Dockerfile.client
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app

  # ── Azure MCP Server ────────────────────────────────────────────────────────
  # Exposes Azure Skills via SSE at http://mcp-azure:3333/sse (Docker-internal)
  # Skills: azure-migrate, advisor, pricing, cloudarchitect, WAF, bestpractices,
  #         compute, AKS, App Service, Container Apps, SQL, Cosmos, Storage, etc.
  # Start with: AZURE_MCP_SERVER_ENABLED=true docker compose up mcp-azure
  mcp-azure:
    build:
      context: .
      dockerfile: docker/Dockerfile.mcp-azure
    environment:
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET:-}
      AZURE_SUBSCRIPTION_ID: ${AZURE_SUBSCRIPTION_ID:-}
    ports:
      - "3333:3333"   # Exposed for local testing; agents use Docker-internal URL
    restart: unless-stopped
    networks:
      - app
    profiles:
      - mcp

  # ── Azure DevOps MCP Server ─────────────────────────────────────────────────
  # Exposes Azure DevOps tools via SSE at http://mcp-devops:3334/sse
  # Tools: repos, work items, pipelines, wikis, test plans, search
  # Requires: AZURE_DEVOPS_ORG + AZURE_DEVOPS_EXT_PAT (PAT with read scopes)
  # Start with: AZURE_DEVOPS_MCP_SERVER_ENABLED=true docker compose up mcp-devops
  mcp-devops:
    build:
      context: .
      dockerfile: docker/Dockerfile.mcp-devops
    environment:
      AZURE_DEVOPS_ORG: ${AZURE_DEVOPS_ORG:-}
      AZURE_DEVOPS_EXT_PAT: ${AZURE_DEVOPS_EXT_PAT:-}
    ports:
      - "3334:3334"
    restart: unless-stopped
    networks:
      - app
    profiles:
      - mcp

  minio:
    image: minio/minio:latest
    ports:
      - "9005:9005"   # S3-compatible API
      - "9006:9006"   # Web console  →  http://localhost:9006
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-efesto}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-changeme_local_minio}
    command: server /data --address ":9005" --console-address ":9006"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9005/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - app

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme_local}
      MONGO_INITDB_DATABASE: architect-framework
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - app

volumes:
  mongo_data:
  efesto_uploads:
  minio_data:

networks:
  app:
    driver: bridge
